# buf.gen.yaml — Code generation config for Panel's knode proto client.
#
# Prerequisites:
#   go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
#   go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
#
# Usage with buf:
#   buf generate ../knode/proto
#
# Usage with protoc (alternative):
#   protoc --go_out=. --go_opt=paths=source_relative \
#          --go-grpc_out=. --go-grpc_opt=paths=source_relative \
#          --proto_path=../knode/proto \
#          ../knode/proto/knode/v1/knode.proto

version: v2
managed:
  enabled: true
  override:
    - file_option: go_package
      value: KorisPanel/panel/internal/knodepb
plugins:
  - remote: buf.build/protocolbuffers/go
    out: panel/internal/knodepb
    opt: paths=source_relative
  - remote: buf.build/grpc/go
    out: panel/internal/knodepb
    opt: paths=source_relative
