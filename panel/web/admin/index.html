<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#070a12" />
    <title>KorisPanel Admin</title>
  </head>
  <body>
    <div id="app">
      <div id="app-loader" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#070a12;z-index:9999;gap:16px">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none" style="animation:spin .8s linear infinite">
          <circle cx="20" cy="20" r="16" stroke="#1e293b" stroke-width="3"/>
          <path d="M36 20a16 16 0 0 0-16-16" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
        </svg>
        <span style="color:#64748b;font-family:system-ui,sans-serif;font-size:13px;letter-spacing:.5px">KorisPanel</span>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
