name: koris

services:
  panel:
    container_name: koris
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "443:443"
      - "80:80"
      - "2026:2026"
    env_file:
      - docker/panel.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - panel-data:/var/lib/koris
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-q", "--spider", "https://localhost:2026/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  db:
    container_name: koris-db
    image: mariadb:10.11
    env_file:
      - docker/panel.env
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  panel-data:
  db-data:
