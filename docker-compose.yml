name: koris

services:
  panel:
    container_name: koris
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        BUILD_TAGS: ${BUILD_TAGS:-}
    ports:
      - "${PANEL_PORT:-2026}:${PANEL_PORT:-2026}"
      - "80:80"
    env_file:
      - docker/panel.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - panel-data:/var/lib/koris
      - /etc/koris:/etc/koris
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-q", "--spider", "https://localhost:2026/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  db:
    container_name: koris-db
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-koris}
      POSTGRES_USER: ${POSTGRES_USER:-koris}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  pgadmin:
    container_name: koris-pgadmin
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@koris.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "True"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  panel-data:
  db-data:
  pgadmin-data:
