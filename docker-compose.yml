name: koris

services:
  panel:
    container_name: koris
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "443:443"
      - "80:80"
      - "2026:2026"
    env_file:
      - docker/panel.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - panel-data:/var/lib/koris
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-q", "--spider", "https://localhost:2026/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  db:
    container_name: koris-db
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-koris}
      POSTGRES_USER: ${POSTGRES_USER:-koris}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U koris"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  panel-data:
  db-data:
